<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Bin Zahim</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Playfair+Display+SC:wght@400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f0f0f; color: #e0d5c5; }

        #login {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; padding: 20px;
        }
        #login h1 {
            font-family: 'Playfair Display', serif; font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 900; margin-bottom: 8px;
        }
        #login p {
            font-family: 'Playfair Display SC', serif; font-size: 0.62rem;
            letter-spacing: 0.2em; text-transform: uppercase; color: #7a7a7a;
            border-top: 1px solid #3a3a3a; border-bottom: 1px solid #3a3a3a;
            padding: 8px 0; width: 100%; max-width: 400px; text-align: center;
            margin-bottom: 24px;
        }
        #login input {
            width: 100%; max-width: 400px; border: 1px solid #3a3a3a;
            padding: 12px; font-size: 1rem; text-align: center;
            letter-spacing: 4px; background: #1a1a1a; color: #e0d5c5; margin-bottom: 8px;
        }
        #login input:focus { outline: 2px solid #c8a96e; }
        #login button {
            background: #e0d5c5; color: #0f0f0f; border: none; padding: 12px 40px;
            font-family: 'Playfair Display SC', serif; font-size: 0.62rem;
            letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer;
        }
        #login button:hover { background: #c8a96e; }
        #login .err { color: #d97070; font-style: italic; font-size: 0.9rem; margin-top: 8px; display: none; }

        #app { display: none; max-width: 780px; margin: 0 auto; padding: 0 28px 60px; }

        .masthead {
            border-top: 6px solid #e0d5c5; padding-top: 10px; margin-top: 36px; text-align: center;
        }
        .masthead h1 {
            font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900; padding: 14px 0 10px;
        }
        .masthead-bottom { border-top: 1px solid #3a3a3a; border-bottom: 4px double #3a3a3a; height: 6px; }
        .section-label {
            font-family: 'Playfair Display SC', serif; font-size: 0.6rem;
            letter-spacing: 0.25em; text-transform: uppercase; color: #7a7a7a;
            text-align: center; padding: 12px 0; border-bottom: 1px solid #3a3a3a;
            margin-bottom: 28px;
        }

        .form-section { border-top: 2px solid #e0d5c5; padding-top: 20px; margin-bottom: 40px; }
        .form-section h2 {
            font-family: 'Playfair Display', serif; font-size: 1.4rem;
            margin-bottom: 16px;
        }
        input[type="text"], textarea {
            width: 100%; border: 1px solid #3a3a3a; padding: 12px;
            font-family: 'Inter', sans-serif; font-size: 0.95rem;
            margin-bottom: 12px; background: #1a1a1a; color: #e0d5c5;
        }
        input[type="text"]:focus, textarea:focus { outline: 2px solid #c8a96e; border-color: #c8a96e; }
        textarea { height: 220px; resize: vertical; }
        .btn-publish {
            background: #e0d5c5; color: #0f0f0f; border: none; padding: 12px 32px;
            font-family: 'Playfair Display SC', serif; font-size: 0.62rem;
            letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer;
        }
        .btn-publish:hover { background: #c8a96e; }
        .success-msg { color: #6dbf6d; font-style: italic; font-size: 0.9rem; margin-top: 8px; display: none; }

        .posts-section { border-top: 2px solid #e0d5c5; padding-top: 20px; }
        .posts-section h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 16px; }
        .post-item {
            border-bottom: 1px solid #232323; padding: 16px 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .post-item h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; }
        .post-item .date { font-size: 11px; color: #7a7a7a; margin-top: 4px; font-family: 'Playfair Display SC', serif; letter-spacing: 0.08em; }
        .post-item-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .btn-edit {
            background: transparent; color: #e0d5c5; border: 1px solid #3a3a3a;
            padding: 6px 14px; font-family: 'Playfair Display SC', serif;
            font-size: 0.58rem; letter-spacing: 0.14em; text-transform: uppercase;
            cursor: pointer;
        }
        .btn-edit:hover { background: #e0d5c5; color: #0f0f0f; border-color: #e0d5c5; }
        .btn-delete {
            background: transparent; color: #d97070; border: 1px solid #d97070;
            padding: 6px 14px; font-family: 'Playfair Display SC', serif;
            font-size: 0.58rem; letter-spacing: 0.14em; text-transform: uppercase;
            cursor: pointer;
        }
        .btn-delete:hover { background: #d97070; color: #0f0f0f; }
        .btn-cancel {
            background: transparent; color: #7a7a7a; border: none;
            padding: 12px 0 0 16px; font-family: 'Playfair Display SC', serif;
            font-size: 0.58rem; letter-spacing: 0.14em; text-transform: uppercase;
            cursor: pointer;
        }
        .btn-cancel:hover { color: #e0d5c5; }
        .empty { font-style: italic; color: #555; font-size: 0.9rem; }

        .home-btn {
            display: inline-block;
            background: #e0d5c5;
            color: #0f0f0f;
            text-decoration: none;
            padding: 10px 28px;
            font-family: 'Playfair Display SC', serif;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        .home-btn:hover { background: #c8a96e; }
    </style>
</head>
<body>

<div id="login">
    <h1>Bin Zahim</h1>
    <p>Admin Access</p>
    <input type="password" id="pw" placeholder="••••••" onkeydown="if(event.key==='Enter') login()">
    <button onclick="login()">Enter</button>
    <div class="err" id="err">Incorrect password</div>
</div>

<div id="app">
    <div class="masthead">
        <h1>Bin Zahim</h1>
        <div class="masthead-bottom"></div>
    </div>
    <div style="text-align:right; padding: 12px 0 0;">
        <a href="index.html" class="home-btn">&#8592; Home</a>
    </div>

    <div class="section-label">Content Manager</div>

    <div class="form-section">
        <h2 id="form-title">New Post</h2>
        <input type="text" id="title" placeholder="Post title" dir="auto">
        <textarea id="content" placeholder="Write your post here..." dir="auto"></textarea>
        <button class="btn-publish" id="btn-submit" onclick="savePost()">Publish</button>
        <button class="btn-cancel" id="btn-cancel" onclick="cancelEdit()" style="display:none">Cancel</button>
        <div class="success-msg" id="msg"></div>
    </div>

    <div class="posts-section">
        <h2>All Posts</h2>
        <div id="posts-list"></div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://btkzjfxxxqukjdnbibsa.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0a3pqZnh4eHF1a2pkbmJpYnNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NDk3NzMsImV4cCI6MjA5ODEyNTc3M30.FvJ5lXhYoBw1Ceinu3fLroFAEB5_iL_5Z2wn24gVXuE';
const ADMIN_PASSWORD = '99';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function showApp() {
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    sessionStorage.setItem('ibzahemUnlocked', 'true');
    loadPosts();
}

if (sessionStorage.getItem('ibzahemUnlocked') === 'true') {
    showApp();
}

function login() {
    if (document.getElementById('pw').value === ADMIN_PASSWORD) {
        showApp();
    } else {
        document.getElementById('err').style.display = 'block';
    }
}

let editingId = null;
const postsCache = {};

async function loadPosts() {
    const { data } = await sb.from('posts').select('*').order('created_at', { ascending: false });
    const list = document.getElementById('posts-list');
    list.innerHTML = '';
    if (!data || data.length === 0) {
        list.innerHTML = '<p class="empty">No posts yet.</p>';
        return;
    }
    data.forEach(post => {
        postsCache[post.id] = post;
        const date = new Date(post.created_at).toLocaleDateString('en-GB', { year: 'numeric', month: 'long', day: 'numeric' });
        list.innerHTML += `
            <div class="post-item">
                <div>
                    <h3>${post.title}</h3>
                    <div class="date">${date}</div>
                </div>
                <div class="post-item-actions">
                    <button class="btn-edit" onclick="editPost('${post.id}')">Edit</button>
                    <button class="btn-delete" onclick="deletePost('${post.id}')">Delete</button>
                </div>
            </div>`;
    });

    const editId = new URLSearchParams(window.location.search).get('edit');
    if (editId && postsCache[editId]) editPost(editId);
}

function editPost(id) {
    const post = postsCache[id];
    if (!post) return;
    editingId = id;
    document.getElementById('title').value = post.title;
    document.getElementById('content').value = post.content;
    document.getElementById('form-title').textContent = 'Edit Post';
    document.getElementById('btn-submit').textContent = 'Save';
    document.getElementById('btn-cancel').style.display = 'inline-block';
    document.getElementById('form-title').scrollIntoView({ behavior: 'smooth' });
    document.getElementById('title').focus();
}

function cancelEdit() {
    editingId = null;
    document.getElementById('title').value = '';
    document.getElementById('content').value = '';
    document.getElementById('form-title').textContent = 'New Post';
    document.getElementById('btn-submit').textContent = 'Publish';
    document.getElementById('btn-cancel').style.display = 'none';
    document.getElementById('msg').style.display = 'none';
}

async function savePost() {
    const title = document.getElementById('title').value.trim();
    const content = document.getElementById('content').value.trim();
    if (!title || !content) return alert('Please fill in both fields!');
    const isEditing = !!editingId;
    if (isEditing) {
        const { error } = await sb.from('posts').update({ title, content }).eq('id', editingId);
        if (error) { alert('Error: ' + error.message); return; }
        cancelEdit();
    } else {
        const { error } = await sb.from('posts').insert({ title, content });
        if (error) { alert('Error: ' + error.message); return; }
        document.getElementById('title').value = '';
        document.getElementById('content').value = '';
    }
    const msg = document.getElementById('msg');
    msg.textContent = isEditing ? 'Updated successfully!' : 'Published successfully!';
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 3000);
    loadPosts();
}

async function deletePost(id) {
    if (!confirm('Delete this post?')) return;
    if (editingId === id) cancelEdit();
    await sb.from('posts').delete().eq('id', id);
    loadPosts();
}
</script>
</body>
</html>
