<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bin Zahim</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Playfair+Display+SC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg:        #111;
            --surface:   #1c1c1c;
            --gold:      #c9a84c;
            --text:      #f0ebe2;
            --muted:     #909090;
            --dim:       #606060;
            --border:    #333;
            --border-sub:#242424;
            --error:     #e07070;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Playfair Display', Georgia, serif;
            max-width: 780px;
            margin: 0 auto;
            padding: 0 32px 80px;
        }

        body.locked { min-height: 100vh; }
        body.locked .site-shell { display: none; }
        body:not(.locked) .password-page { display: none; }

        /* ── Password screen ── */

        .password-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-card {
            width: 100%;
            max-width: 480px;
            border-top: 5px solid var(--gold);
            border-bottom: 1px solid var(--border);
            padding: 28px 0 36px;
            text-align: center;
        }

        .password-kicker {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 28px;
            font-family: 'Playfair Display SC', serif;
            font-size: 0.64rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--dim);
        }

        .password-title {
            font-size: clamp(3rem, 11vw, 6rem);
            font-weight: 900;
            letter-spacing: 0.04em;
            line-height: 1;
            padding: 0 0 20px;
        }

        .password-subtitle {
            font-family: 'Playfair Display SC', serif;
            font-size: 0.64rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 10px 0;
            margin-bottom: 28px;
        }

        .password-form { text-align: left; }

        .password-label {
            display: block;
            margin-bottom: 10px;
            font-family: 'Playfair Display SC', serif;
            font-size: 0.66rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .password-row {
            display: flex;
            border: 1px solid var(--border);
        }

        .password-input {
            min-width: 0;
            flex: 1;
            border: 0;
            border-right: 1px solid var(--border);
            padding: 13px 14px;
            font: 1rem Georgia, serif;
            color: var(--text);
            background: var(--surface);
        }

        .password-input::placeholder { color: var(--dim); }

        .password-input:focus {
            outline: 2px solid var(--gold);
            outline-offset: -1px;
        }

        .password-submit {
            border: 0;
            background: var(--gold);
            color: #111;
            padding: 0 20px;
            font-family: 'Playfair Display SC', serif;
            font-size: 0.64rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            cursor: pointer;
            font-weight: 700;
        }

        .password-submit:hover { background: #b8943e; }

        .password-error {
            min-height: 1.4em;
            margin-top: 12px;
            font-style: italic;
            font-size: 0.9rem;
            color: var(--error);
        }

        /* ── Masthead ── */

        .masthead {
            border-top: 5px solid var(--gold);
            padding-top: 12px;
            margin-top: 48px;
            text-align: center;
        }

        .masthead-meta {
            display: flex;
            justify-content: space-between;
            font-family: 'Playfair Display SC', serif;
            font-size: 0.66rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--muted);
            padding-bottom: 10px;
        }

        .masthead-rule {
            border: none;
            border-top: 1px solid var(--border);
            margin: 0;
        }

        .site-title {
            font-size: clamp(3.5rem, 12vw, 6.5rem);
            font-weight: 900;
            letter-spacing: 0.04em;
            line-height: 1;
            padding: 16px 0 12px;
        }

        .site-title a {
            color: inherit;
            text-decoration: none;
        }

        .tagline {
            font-style: italic;
            font-size: 0.9rem;
            color: var(--muted);
            letter-spacing: 0.03em;
            padding: 0 0 14px;
        }

        .masthead-bottom {
            border-top: 1px solid var(--border);
            border-bottom: 3px double var(--gold);
            height: 7px;
        }

        /* ── Post full view ── */

        .back-link {
            display: inline-block;
            margin: 36px 0 0;
            font-family: 'Playfair Display SC', serif;
            font-size: 0.64rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            text-decoration: none;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 2px;
        }

        .back-link:hover {
            color: var(--text);
            border-bottom-color: var(--text);
        }

        .post-full {
            padding: 32px 0 0;
            border-top: 2px solid var(--gold);
            margin-top: 24px;
        }

        .post-full-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .post-full-date {
            font-family: 'Playfair Display SC', serif;
            font-size: 0.68rem;
            letter-spacing: 0.1em;
            color: var(--gold);
        }

        .btn-edit-post {
            font-family: 'Playfair Display SC', serif;
            font-size: 0.6rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--muted);
            border: 1px solid var(--border);
            padding: 6px 16px;
            text-decoration: none;
            background: transparent;
        }

        .btn-edit-post:hover {
            color: var(--text);
            border-color: var(--text);
        }

        .post-full-title {
            font-size: clamp(2.1rem, 5.5vw, 3.4rem);
            font-weight: 700;
            line-height: 1.14;
            margin-bottom: 32px;
            padding-bottom: 26px;
            border-bottom: 1px solid var(--border);
        }

        .post-body {
            font-size: 1.1rem;
            line-height: 1.95;
            color: #d8d0c4;
        }

        .post-body p {
            margin-bottom: 1.5em;
        }

        .post-body p:last-child {
            margin-bottom: 0;
        }

        .loading-state, .empty-state {
            font-style: italic;
            color: var(--dim);
            font-size: 0.95rem;
            padding: 40px 0;
        }

        /* ── Footer ── */

        .footer {
            margin-top: 64px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
            text-align: center;
        }

        .footer-text {
            font-family: 'Playfair Display SC', serif;
            font-size: 0.64rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--dim);
        }

        @media (max-width: 520px) {
            body { padding: 0 20px 56px; }
            .password-row { display: block; border: 0; }
            .password-input { width: 100%; border: 1px solid var(--border); }
            .password-submit { width: 100%; min-height: 46px; margin-top: 10px; border: 0; }
        }
    </style>
</head>
<body class="locked">

    <section class="password-page" aria-labelledby="password-title">
        <div class="password-card">
            <div class="password-kicker">
                <span>Private Edition</span>
                <span>Authorized Readers</span>
            </div>
            <h1 class="password-title" id="password-title">Bin Zahim</h1>
            <p class="password-subtitle">Enter password to read today's issue</p>
            <form class="password-form" id="password-form">
                <label class="password-label" for="password-input">Password</label>
                <div class="password-row">
                    <input class="password-input" id="password-input" type="password" autocomplete="current-password" required>
                    <button class="password-submit" type="submit">Unlock</button>
                </div>
                <p class="password-error" id="password-error" aria-live="polite"></p>
            </form>
        </div>
    </section>

    <div class="site-shell">
        <header class="masthead">
            <div class="masthead-meta">
                <span>Est. 2026</span>
                <span>Independent</span>
                <span>June 27, 2026</span>
            </div>
            <hr class="masthead-rule">
            <h1 class="site-title"><a href="index.html">Bin Zahim</a></h1>
            <p class="tagline">Notes on things I read and find interesting.</p>
            <div class="masthead-bottom"></div>
        </header>

        <main>
            <a class="back-link" href="index.html">&larr; All Posts</a>
            <div id="post-container"><p class="loading-state">Loading&hellip;</p></div>
        </main>

        <footer class="footer">
            <p class="footer-text">بن زاحم &mdash; جميع الحقوق محفوظة</p>
        </footer>
    </div>

    <script>
        const SUPABASE_URL = 'https://btkzjfxxxqukjdnbibsa.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0a3pqZnh4eHF1a2pkbmJpYnNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NDk3NzMsImV4cCI6MjA5ODEyNTc3M30.FvJ5lXhYoBw1Ceinu3fLroFAEB5_iL_5Z2wn24gVXuE';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function renderBody(content) {
            return content
                .split(/\n{2,}/)
                .map(function (p) { return '<p dir="auto">' + escapeHtml(p).replace(/\n/g, '<br>') + '</p>'; })
                .join('');
        }

        async function loadPost() {
            const id = new URLSearchParams(window.location.search).get('id');
            const container = document.getElementById('post-container');

            if (!id) {
                window.location.href = 'index.html';
                return;
            }

            const { data, error } = await sb.from('posts').select('*').eq('id', id).single();

            if (error || !data) {
                container.innerHTML = '<p class="empty-state">Post not found.</p>';
                return;
            }

            document.title = data.title + ' — Bin Zahim';

            const date = new Date(data.created_at).toLocaleDateString('en-GB', { year: 'numeric', month: 'long', day: 'numeric' });

            container.innerHTML = `
                <article class="post-full">
                    <div class="post-full-header">
                        <p class="post-full-date">${date}</p>
                        <a class="btn-edit-post" href="admin.html?edit=${data.id}">Edit</a>
                    </div>
                    <h2 class="post-full-title" dir="auto">${escapeHtml(data.title)}</h2>
                    <div class="post-body">${renderBody(data.content)}</div>
                </article>`;
        }

        (function () {
            var correctPassword = '99';
            var storageKey = 'ibzahemUnlocked';
            var form = document.getElementById('password-form');
            var input = document.getElementById('password-input');
            var error = document.getElementById('password-error');

            function unlock() {
                document.body.classList.remove('locked');
                sessionStorage.setItem(storageKey, 'true');
                loadPost();
            }

            if (sessionStorage.getItem(storageKey) === 'true') {
                unlock();
                return;
            }

            input.focus();

            form.addEventListener('submit', function (event) {
                event.preventDefault();
                if (input.value === correctPassword) {
                    unlock();
                    return;
                }
                error.textContent = 'Incorrect password. Please try again.';
                input.value = '';
                input.focus();
            });
        }());
    </script>

</body>
</html>
